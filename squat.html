<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階 10 分鐘深蹲計時器 (3-2-1法)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-green: #2ea043;
            --accent-blue: #1f6feb;
            --accent-orange: #d16527;
            --accent-yellow: #e3b341;
            --accent-purple: #8250df;
            --panel-bg: #161b22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            overflow-y: auto;
        }

        /* --- 頂部時鐘區塊 --- */
        .clock-container {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
            width: 90%;
            max-width: 600px;
        }
        .time-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 15px;
            color: #fff;
        }
        .ampm { font-size: 2rem; }
        .main-time { font-size: 6rem; line-height: 1; font-weight: 300; }
        .seconds { font-size: 2rem; }
        .date-display { font-size: 1.2rem; margin-top: 10px; color: #8b949e; }

        /* --- 設定面板區塊 --- */
        .settings-panel {
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 560px;
            margin-bottom: 20px;
            display: none; 
            box-sizing: border-box;
        }
        .settings-panel h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        .setting-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .setting-group label { font-size: 1.1rem; }
        .setting-group input {
            width: 80px;
            padding: 5px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #fff;
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
        }
        .preview-group {
            border-top: 1px dashed #30363d;
            padding-top: 15px;
            margin-top: 10px;
        }
        .preview-time {
            font-size: 1.3rem;
            color: var(--accent-yellow);
            font-weight: bold;
            padding-right: 5px;
        }
        .settings-actions {
            text-align: right;
            margin-top: 20px;
        }

        /* --- 計時器區塊 --- */
        .timer-container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 30px 20px;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        
        .total-time-display {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .status {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-color);
            min-height: 40px;
        }

        .countdown {
            font-size: 8rem;
            font-weight: bold;
            margin: 10px 0;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .info-bar {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #c9d1d9;
        }

        .tempo-reminder {
            font-size: 1.1rem;
            color: var(--accent-yellow);
            margin-bottom: 25px;
            background: rgba(227, 179, 65, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(227, 179, 65, 0.2);
            line-height: 1.6;
        }

        .tempo-reminder b {
            color: #fff;
        }

        /* --- 按鈕區塊 --- */
        .controls button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 12px 24px;
            font-size: 1.2rem;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .controls button:hover { background-color: #30363d; }
        
        #startBtn { background-color: var(--accent-green); color: #fff; border-color: var(--accent-green); }
        #startBtn:hover { background-color: #238636; }
        
        #settingsBtn { background-color: transparent; border: none; text-decoration: underline; font-size: 1rem; margin-top: 15px; }
        #settingsBtn:hover { color: #fff; background: none; }
        
        .save-btn { background-color: var(--accent-blue) !important; color: #fff !important; }

    </style>
</head>
<body>

    <div class="clock-container">
        <div class="time-display">
            <div class="ampm" id="ampm">PM</div>
            <div class="main-time" id="mainTime">4:17</div>
            <div class="seconds" id="seconds">.12</div>
        </div>
        <div class="date-display" id="dateDisplay">中華民國 115 年 03 月 24 日 (星期二)</div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <h3>⚙️ 計時器參數設定</h3>
        <div class="setting-group">
            <label for="inpWarmup">暖身時間 (秒)</label>
            <input type="number" id="inpWarmup" min="0">
        </div>
        <div class="setting-group">
            <label for="inpWork">單組深蹲時間 (秒)</label>
            <input type="number" id="inpWork" min="10">
        </div>
        <div class="setting-group">
            <label for="inpRest">單組休息時間 (秒)</label>
            <input type="number" id="inpRest" min="0">
        </div>
        <div class="setting-group">
            <label for="inpSets">總組數 (組)</label>
            <input type="number" id="inpSets" min="1">
        </div>
        <div class="setting-group">
            <label for="inpCooldown">伸展緩和時間 (秒)</label>
            <input type="number" id="inpCooldown" min="0">
        </div>

        <div class="setting-group preview-group">
            <label style="color: var(--accent-yellow); font-weight: bold;">💡 預計總用時</label>
            <div class="preview-time" id="previewTotalTime">00:00</div>
        </div>

        <div class="settings-actions">
            <button id="cancelSettingsBtn">取消</button>
            <button id="saveSettingsBtn" class="save-btn">儲存並套用</button>
        </div>
    </div>

    <div class="timer-container" id="timerContainer">
        <div class="total-time-display">總剩餘時間: <span id="totalTimeStr">00:00</span></div>
        <div class="status" id="statusText">準備開始</div>
        <div class="countdown" id="countdown">0</div>

        <div class="info-bar">
            目前組數：<span id="currentSet">0</span> / <span id="totalSetsDisplay">10</span>
        </div>

        <div class="tempo-reminder">
            💡 <b>3-2-1 節奏：</b>下蹲 3 秒 ➜ 底部停頓 2 秒 ➜ 站起 1 秒<br>
            🫁 <b>呼吸方式：</b>下蹲 <b>吸氣</b> ➜ 停頓 <b>微吐(緩慢漏氣)</b> ➜ 站起 <b>用力吐光</b><br>
            <span style="font-size: 0.95rem; color: #8b949e; display: inline-block; margin-top: 8px;">
                (保持喉嚨暢通勿閉氣。視體適能單組約做 5~7 下)
            </span>
        </div>

        <div class="controls">
            <button id="startBtn">開始</button>
            <button id="resetBtn">重設</button>
            <br>
            <button id="settingsBtn">⚙️ 調整參數</button>
        </div>
    </div>

    <a href="index.html" style="color: var(--accent-blue); text-decoration: none; text-align: center; margin-top: 10px;">← 返回儀表板</a>

    <script>
        // ==========================================
        // 1. JS 常用預設值區
        // ==========================================
        const DEFAULT_SETTINGS = {
            warmup: 90,
            work: 45,
            rest: 15,
            sets: 7,
            cooldown: 90
        };

        let currentSettings = { ...DEFAULT_SETTINGS };

        // ==========================================
        // 2. 時鐘邏輯
        // ==========================================
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('ampm').textContent = ampm;
            document.getElementById('mainTime').textContent = `${hours}:${minutes}`;
            document.getElementById('seconds').textContent = `.${seconds}`;

            const rocYear = now.getFullYear() - 1911;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

            document.getElementById('dateDisplay').textContent = `中華民國 ${rocYear} 年 ${month} 月 ${date} 日 (${days[now.getDay()]})`;
        }
        setInterval(updateClock, 100);
        updateClock();

        // ==========================================
        // 3. 階段計時器邏輯
        // ==========================================
        const PHASES = {
            IDLE: 'IDLE', WARMUP: 'WARMUP', WORK: 'WORK', REST: 'REST', COOLDOWN: 'COOLDOWN', DONE: 'DONE'
        };

        let phase = PHASES.IDLE;
        let phaseTimeLeft = 0;
        let totalTimeLeft = 0;
        let currentSet = 0;
        let timerInterval = null;
        let isRunning = false;

        const statusEl = document.getElementById('statusText');
        const countdownEl = document.getElementById('countdown');
        const totalTimeStrEl = document.getElementById('totalTimeStr');
        const currentSetEl = document.getElementById('currentSet');
        const totalSetsDisplayEl = document.getElementById('totalSetsDisplay');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        const settingsPanel = document.getElementById('settingsPanel');
        const timerContainer = document.getElementById('timerContainer');
        const btnOpenSettings = document.getElementById('settingsBtn');
        const btnCancelSettings = document.getElementById('cancelSettingsBtn');
        const btnSaveSettings = document.getElementById('saveSettingsBtn');
        const previewTotalTimeEl = document.getElementById('previewTotalTime');

        // 格式化時間 (MM:SS)
        function formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 計算總時間邏輯
        function calculateSpecificTotalTime(w, wk, r, s, c) {
            let restSets = s > 1 ? s - 1 : 0;
            return w + (wk * s) + (r * restSets) + c;
        }

        function calculateTotalTime() {
            return calculateSpecificTotalTime(
                currentSettings.warmup, currentSettings.work,
                currentSettings.rest, currentSettings.sets, currentSettings.cooldown
            );
        }

        // 初始化/重設介面
        function initTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            phase = PHASES.IDLE;
            currentSet = 0;

            totalTimeLeft = calculateTotalTime();
            totalTimeStrEl.textContent = formatTime(totalTimeLeft);
            totalSetsDisplayEl.textContent = currentSettings.sets;
            currentSetEl.textContent = "0";

            phaseTimeLeft = currentSettings.warmup > 0 ? currentSettings.warmup : currentSettings.work;
            countdownEl.textContent = phaseTimeLeft;
            countdownEl.style.color = "#c9d1d9";

            statusEl.textContent = "準備開始";
            statusEl.style.color = "#c9d1d9";

            startBtn.textContent = "開始訓練";
            startBtn.style.backgroundColor = "var(--accent-green)";
            startBtn.style.borderColor = "var(--accent-green)";
        }

        function playBeep(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);

                if (type === 'work') { osc.frequency.value = 800; }
                else if (type === 'rest') { osc.frequency.value = 400; }
                else { osc.frequency.value = 600; }

                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {
                console.log("Audio play failed");
            }
        }

        function nextPhase() {
            if (phase === PHASES.IDLE) {
                if (currentSettings.warmup > 0) setPhase(PHASES.WARMUP);
                else { currentSet = 1; setPhase(PHASES.WORK); }
            }
            else if (phase === PHASES.WARMUP) { currentSet = 1; setPhase(PHASES.WORK); }
            else if (phase === PHASES.WORK) {
                if (currentSet >= currentSettings.sets) {
                    if (currentSettings.cooldown > 0) setPhase(PHASES.COOLDOWN);
                    else setPhase(PHASES.DONE);
                } else {
                    if (currentSettings.rest > 0) setPhase(PHASES.REST);
                    else { currentSet++; setPhase(PHASES.WORK); }
                }
            }
            else if (phase === PHASES.REST) { currentSet++; setPhase(PHASES.WORK); }
            else if (phase === PHASES.COOLDOWN) { setPhase(PHASES.DONE); }
        }

        function setPhase(newPhase) {
            phase = newPhase;
            currentSetEl.textContent = currentSet > 0 ? currentSet : 0;

            switch (phase) {
                case PHASES.WARMUP:
                    phaseTimeLeft = currentSettings.warmup;
                    statusEl.textContent = "🚶‍♂️ 暖身中"; statusEl.style.color = "var(--accent-orange)"; countdownEl.style.color = "var(--accent-orange)"; playBeep('other');
                    break;
                case PHASES.WORK:
                    phaseTimeLeft = currentSettings.work;
                    statusEl.textContent = "🔥 深蹲！(3-2-1)"; statusEl.style.color = "var(--accent-green)"; countdownEl.style.color = "var(--accent-green)"; playBeep('work');
                    break;
                case PHASES.REST:
                    phaseTimeLeft = currentSettings.rest;
                    statusEl.textContent = "💧 休息一下"; statusEl.style.color = "var(--accent-blue)"; countdownEl.style.color = "var(--accent-blue)"; playBeep('rest');
                    break;
                case PHASES.COOLDOWN:
                    phaseTimeLeft = currentSettings.cooldown;
                    statusEl.textContent = "🧘‍♂️ 緩和伸展"; statusEl.style.color = "var(--accent-purple)"; countdownEl.style.color = "var(--accent-purple)"; playBeep('other');
                    break;
                case PHASES.DONE:
                    phaseTimeLeft = 0; totalTimeLeft = 0;
                    statusEl.textContent = "🎉 訓練完成！"; statusEl.style.color = "var(--accent-yellow)"; countdownEl.style.color = "var(--text-color)";
                    clearInterval(timerInterval); isRunning = false;
                    startBtn.textContent = "重新開始"; startBtn.style.backgroundColor = "var(--accent-green)"; startBtn.style.borderColor = "var(--accent-green)";
                    playBeep('work'); setTimeout(() => playBeep('work'), 400);
                    break;
            }
            updateDisplay();
        }

        function updateDisplay() {
            countdownEl.textContent = phaseTimeLeft;
            totalTimeStrEl.textContent = formatTime(totalTimeLeft);
        }

        function tick() {
            if (phaseTimeLeft > 0) {
                phaseTimeLeft--;
                if (totalTimeLeft > 0) totalTimeLeft--;
                updateDisplay();
            } else {
                nextPhase();
            }
        }

        // --- 按鈕事件 ---
        startBtn.addEventListener('click', () => {
            if (phase === PHASES.DONE) initTimer();
            if (isRunning) {
                clearInterval(timerInterval); isRunning = false;
                startBtn.textContent = "繼續"; startBtn.style.backgroundColor = "var(--accent-yellow)"; startBtn.style.borderColor = "var(--accent-yellow)"; startBtn.style.color = "#000";
            } else {
                if (phase === PHASES.IDLE) nextPhase();
                timerInterval = setInterval(tick, 1000); isRunning = true;
                startBtn.textContent = "暫停"; startBtn.style.backgroundColor = "#da3633"; startBtn.style.borderColor = "#da3633"; startBtn.style.color = "#fff";
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
            }
        });

        resetBtn.addEventListener('click', initTimer);

        // --- 設定面板互動邏輯 ---
        function updatePreviewTime() {
            const w = parseInt(document.getElementById('inpWarmup').value) || 0;
            const wk = parseInt(document.getElementById('inpWork').value) || 0;
            const r = parseInt(document.getElementById('inpRest').value) || 0;
            const s = parseInt(document.getElementById('inpSets').value) || 1;
            const c = parseInt(document.getElementById('inpCooldown').value) || 0;

            const previewTotal = calculateSpecificTotalTime(w, wk, r, s, c);
            previewTotalTimeEl.textContent = formatTime(previewTotal);
        }

        ['inpWarmup', 'inpWork', 'inpRest', 'inpSets', 'inpCooldown'].forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreviewTime);
        });

        btnOpenSettings.addEventListener('click', () => {
            document.getElementById('inpWarmup').value = currentSettings.warmup;
            document.getElementById('inpWork').value = currentSettings.work;
            document.getElementById('inpRest').value = currentSettings.rest;
            document.getElementById('inpSets').value = currentSettings.sets;
            document.getElementById('inpCooldown').value = currentSettings.cooldown;

            updatePreviewTime();

            timerContainer.style.display = 'none';
            settingsPanel.style.display = 'block';
            if (isRunning) startBtn.click();
        });

        btnCancelSettings.addEventListener('click', () => {
            settingsPanel.style.display = 'none';
            timerContainer.style.display = 'block';
        });

        btnSaveSettings.addEventListener('click', () => {
            currentSettings.warmup = parseInt(document.getElementById('inpWarmup').value) || 0;
            currentSettings.work = parseInt(document.getElementById('inpWork').value) || 10;
            currentSettings.rest = parseInt(document.getElementById('inpRest').value) || 0;
            currentSettings.sets = parseInt(document.getElementById('inpSets').value) || 1;
            currentSettings.cooldown = parseInt(document.getElementById('inpCooldown').value) || 0;

            settingsPanel.style.display = 'none';
            timerContainer.style.display = 'block';
            initTimer();
        });

        initTimer();
    </script>
</body>
</html>
